<script>
async function analyzeProduct() {
  const product = prompt("Paste Meesho or GlowRoad product link:");
  if (!product) return;

  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "⏳ UltraFS AI is analyzing your product metrics...";

  try {
    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbzzKD6U_fFS0yf3mUq3mVOKroYmhNqgTPVZoBcJ6z6vsW4QxdN4Ofxpo_pP9EY57wyf/exec", // Make sure this matches your NEW deployment URL
      {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=UTF-8"
        },
        body: JSON.stringify({ product: product })
      }
    );

    const text = await response.text();
    const data = JSON.parse(text);

    // If backend caught an execution error
    if (data.error) {
      resultDiv.innerHTML = `❌ <strong>Error:</strong><br>${data.error}`;
      return;
    }

    // Format and display the AI analytics beautifully
    resultDiv.innerHTML = `
      <div style="text-align: left; line-height: 1.6;">
        <h3 style="color: gold; margin-top: 0;">📦 ${data.productName || 'Product Analysis'}</h3>
        <p><strong>Category:</strong> ${data.category}</p>
        <p><strong>Resale Score:</strong> ⭐ ${data.score}/100 (Trend: ${data.trendScore}%)</p>
        <p><strong>Supplier Cost:</strong> ₹${data.supplierPrice}</p>
        <p><strong>Recommended Selling Price:</strong> ₹${data.sellingPrice}</p>
        <p><strong>Estimated Profit Margin:</strong> <span style="color: #00ff88;">₹${data.estimatedProfit}</span></p>
        <p><strong>Competition:</strong> ${data.competition}</p>
        <p><strong>Target Audience:</strong> ${data.targetAudience}</p>
        <p><strong>Decision:</strong> <span style="padding: 2px 8px; border-radius: 5px; font-weight: bold; background: ${data.recommendation === 'BUY' ? '#1b5e20' : '#b71c1c'};">${data.recommendation}</span></p>
        <p><strong>Analysis:</strong> ${data.reason}</p>
        <hr style="border-color: #333;">
        <p style="color: gold; font-weight: bold; margin-bottom: 5px;">📱 Instagram Copywriting:</p>
        <p style="background: #111; padding: 10px; border-radius: 8px; font-style: italic;">${data.instagramCaption}</p>
        <p style="color: #888; font-size: 14px;">${Array.isArray(data.hashtags) ? data.hashtags.join(' ') : data.hashtags}</p>
      </div>
    `;

  } catch (err) {
    resultDiv.innerHTML = "❌ Connection Error:<br>" + err;
  }
}
</script>
