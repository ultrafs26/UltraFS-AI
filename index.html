<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UltraFS AI</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#111;
            color:white;
            text-align:center;
        }

        .header{
            background:#000;
            padding:20px;
            font-size:28px;
            font-weight:bold;
            border-bottom:2px solid gold;
        }

        .container{
            padding:20px;
        }

        .card{
            background:#1f1f1f;
            margin:15px 0;
            padding:18px;
            border-radius:15px;
            cursor:pointer;
            font-size:18px;
        }

        .card:hover{
            background:#2f2f2f;
        }

        .summary{
            margin-top:30px;
            background:#1f1f1f;
            padding:20px;
            border-radius:15px;
        }

        h2{
            color:gold;
        }
    </style>

</head>

<body>

<div class="header">
UltraFS AI
</div>

<div class="container">

<div class="card" onclick="analyzeProduct()">
🔍 Analyze Product
</div>

<div class="card">
💰 Selling Price Calculator
</div>

<div class="card">
📱 Instagram Post Generator
</div>

<div class="card">
📊 Product Database
</div>

<div id="result"
style="
margin:20px;
padding:20px;
background:#1f1f1f;
border-radius:15px;">
</div>
    
<div class="summary">

<h2>Today's Summary</h2>

<p>Approved Products : 0</p>

<p>Expected Profit : ₹0</p>

</div>

</div>
    
<script>

async function analyzeProduct() {

  const product = prompt("Paste Meesho or GlowRoad product link:");
  if (!product) return;

  document.getElementById("result").innerHTML = "⏳ UltraFS AI is analyzing...";

  try {

    const response = await fetch(
  "https://script.google.com/macros/s/AKfycbxjeqUZrmsfl7cSE4RV6Ye88S-uwMMrfG5K3XtzuLyuUD0pZbX9sZxv3x-RQPRop87E/exec",
  {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=UTF-8"
    },
    body: JSON.stringify({
      product: product
    })
  }
);

const text = await response.text();
document.getElementById("result").innerHTML =
  "<pre>" + text + "</pre>";
  } catch (err) {

    document.getElementById("result").innerHTML =
      "❌ Error:<br>" + err;

  }

}
    
</script>
    
</body>
</html>
